# Cordys CRM 1.7.0 部署配置

# ============================================
# 端口配置（按需修改）
# ============================================

# 前端访问端口（浏览器访问 http://服务器IP:FRONTEND_PORT）
FRONTEND_PORT=18083

# 后端服务端口（容器内部始终 8081，对外映射到此端口）
BACKEND_PORT=18084

# ============================================
# 容器命名
# ============================================
# 当前环境复用已有的 MySQL/Redis 容器（与 1.6.x 共享）
# 如需完全隔离，取消下方注释并修改为新容器名

APP_CONTAINER=cordys-crm-1.7.0
MYSQL_CONTAINER=cordys-mysql
REDIS_CONTAINER=cordys-redis

# 完全隔离模式（可选，需要单独创建 MySQL/Redis 容器）:
# MYSQL_CONTAINER=cordys-mysql-1.7.0
# REDIS_CONTAINER=cordys-redis-1.7.0

# ============================================
# 数据库配置
# ============================================

DB_NAME=cordys-crm-1.7.0
DB_USER=root
DB_PASSWORD=root
DB_PORT=3307

# ============================================
# 路径配置
# ============================================
# 以下路径由脚本自动检测，一般无需修改
# SOURCE_DIR = Deploy/ 的上级目录（即 CordysCRM-1.7.0 源码根目录）
# DEPLOY_DIR = $HOME/cordys-1.7.0（JAR、配置、日志输出目录）
#
# 如需自定义，取消注释并修改：
# SOURCE_DIR=/your/path/to/CordysCRM-1.7.0
# DEPLOY_DIR=/your/path/to/cordys-1.7.0

# ============================================
# Docker 网络
# ============================================

NETWORK_NAME=cordyscrm_cordyscrm_default

# ============================================
# 基础镜像
# ============================================

BASE_IMAGE=1panel/cordys-crm:v1.7.0
